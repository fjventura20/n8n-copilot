<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n Copilot Chat</title>
  <link rel="stylesheet" href="chatbot.css">
</head>
<body>
<div id="n8n-builder-chat" class="n8n-builder-container">
  <div class="n8n-builder-side-panel" id="n8n-builder-side-panel">
    <div class="n8n-builder-side-panel-header">
      <h2>History</h2>
      <button id="n8n-builder-close-side-panel" title="Close">×</button>
    </div>
    <div class="n8n-builder-history-container" id="n8n-builder-history-container">
      <!-- Chat history will be loaded here -->
    </div>
  </div>
  <div class="n8n-builder-main-panel">
    <div class="n8n-builder-header">
      <div class="n8n-builder-title-section">
        <span class="n8n-builder-title">n8n Co Pilot</span>
        <span id="n8n-page-indicator" class="n8n-page-indicator" title="n8n Page Status">●</span>
        <span class="version-indicator">v2.0</span>
      </div>
      <div class="n8n-builder-controls">
        <button id="n8n-builder-minimize" title="Minimize">_</button>
        <button id="n8n-builder-close" title="Close">×</button>
      </div>
    </div>
    <div class="n8n-builder-messages" id="n8n-builder-messages">
      <!-- Messages will be added here dynamically -->
    </div>
    <div class="n8n-builder-actions" id="n8n-builder-actions">
      <!-- Action buttons and JSON handling will be added here dynamically -->
    </div>
    <div class="n8n-builder-input-area">
      <textarea id="n8n-builder-input" placeholder="Enter your request" rows="2"></textarea>
      <button id="n8n-builder-send">Send</button>
    </div>
    <div class="n8n-builder-footer">
      <div class="n8n-builder-status">
        <span id="n8n-api-status" class="status-indicator"></span>
        <span id="n8n-api-status-text">API Status</span>
      </div>
      <button id="n8n-builder-clear" title="Clear Chat" class="n8n-builder-clear-btn">Clear</button>
      <button id="n8n-builder-history" title="View Chat History" class="n8n-builder-history-btn">History</button>
    </div>
  </div>
</div>
</body>
</html>
